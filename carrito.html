<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de compras | Urban Kickz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="min-h-screen bg-white flex flex-col">
    <nav class="p-8 flex justify-between items-center border-b border-gray-50">
        <span class="text-xl font-black tracking-tighter uppercase">Urban Kickz</span>
        <button class="text-sm font-bold uppercase tracking-widest hover:line-through cursor-pointer">
            <a href="index.html"><strong>CERRAR</strong></a>
        </button>
    </nav>

    <main id="cart-main-container" class="flex-1 flex flex-col lg:flex-row">
        </main>
</div>

<script>
    function renderCart() {
        const mainContainer = document.getElementById('cart-main-container');
        const cart = JSON.parse(localStorage.getItem('urbanKickzCart')) || [];

        // ESTADO 1: Carrito Vacío (Tu diseño original)
        if (cart.length === 0) {
            mainContainer.innerHTML = `
                <div class="flex-1 flex flex-col justify-center px-12 lg:px-24 border-r border-gray-50">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-[0.5em] mb-4">Estado de la bolsa</span>
                    <h1 class="text-5xl lg:text-7xl font-black text-black leading-none uppercase mb-8">
                        Agrega productos al carrito para visualizar
                    </h1>
                    <p class="text-gray-400 text-lg max-w-md leading-relaxed">
                        Tu selección está vacía. Explora nuestras últimas colecciones de calzado y conjuntos exclusivos.
                    </p>
                </div>

                <div class="lg:w-1/3 bg-gray-50 flex flex-col justify-center px-12 space-y-8">
                    <button class="w-full bg-black text-white py-6 text-sm font-bold uppercase tracking-widest hover:scale-[1.02] transition-transform cursor-pointer">
                        <a href="comprar.html">Ver lo más Nuevo</a>
                    </button>
                    <div class="space-y-4">
                        <p class="text-[10px] font-black uppercase text-gray-400 tracking-widest border-b border-gray-200 pb-2">Atención rápida</p>
                        <a href="contact.html" class="block text-sm font-bold hover:translate-x-2 transition-transform">Guía de tallas</a>
                        <a href="contact.html" class="block text-sm font-bold hover:translate-x-2 transition-transform">Envíos y devoluciones</a>
                        <a href="contact.html" class="block text-sm font-bold hover:translate-x-2 transition-transform">Hablar con soporte</a>
                    </div>
                </div>
            `;
            return;
        }

        // ESTADO 2: Carrito con Productos
        const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

        mainContainer.innerHTML = `
            <div class="flex-1 px-12 lg:px-24 py-12 border-r border-gray-50 overflow-y-auto">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-[0.5em] mb-8 block">Tu Selección (${cart.length})</span>
                <div class="space-y-12">
                    ${cart.map((item, index) => `
                        <div class="flex flex-col md:flex-row gap-8 items-center border-b border-gray-50 pb-8">
                            <img src="${item.image}" class="w-40 h-40 object-cover rounded-sm bg-gray-100">
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h2 class="text-2xl font-black uppercase tracking-tighter">${item.name}</h2>
                                    <button onclick="removeItem(${index})" class="text-gray-300 hover:text-black transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                <p class="text-gray-400 font-bold text-sm mt-2 uppercase tracking-widest">Talla: ${item.size}</p>
                                <div class="flex justify-between items-end mt-8">
                                    <p class="text-sm font-bold">CANTIDAD: ${item.quantity}</p>
                                    <p class="text-xl font-black">$${(item.price * item.quantity).toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="lg:w-1/3 bg-gray-50 flex flex-col justify-between p-12">
                <div class="space-y-8">
                    <p class="text-[10px] font-black uppercase text-gray-400 tracking-widest border-b border-gray-200 pb-2">Resumen de orden</p>
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-gray-500 uppercase">Subtotal</span>
                        <span class="font-bold">$${total.toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-black pt-4">
                        <span class="text-lg font-black uppercase">Total</span>
                        <span class="text-3xl font-black">$${total.toLocaleString()}</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <button class="w-full bg-black text-white py-6 text-sm font-bold uppercase tracking-widest hover:bg-gray-800 transition-all cursor-pointer">
                        <a href="finalizar.html">Finalizar Pedido</a>
                    </button>
                    <button class="w-full border border-black py-6 text-sm font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all cursor-pointer">
                        <a href="comprar.html">Continuar Comprando</a>
                    </button>
                </div>
            </div>
        `;
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('urbanKickzCart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('urbanKickzCart', JSON.stringify(cart));
        renderCart(); // Re-renderiza para actualizar la vista
    }

    // Inicializar al cargar la página
    document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
