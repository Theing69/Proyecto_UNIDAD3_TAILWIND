<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
     <link href="./dist/output.css" rel="stylesheet">
</head>
<body>
    <section class="bg-white py-24 px-6">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
        
        <div class="space-y-10">
            <div>
                <span class="text-sm font-bold uppercase tracking-widest text-gray-400">Contacto</span>
                <h2 class="text-4xl md:text-5xl font-black text-black mt-2 mb-4">Hablemos.</h2>
                <p class="text-gray-500 text-lg max-w-md">
                    ¿Tienes alguna duda o solo quieres saludar? Selecciona una opción rápida o escríbenos directamente.
                </p>
            </div>

            <div>
                <p class="text-sm font-bold text-black mb-4 uppercase">¿En qué te podemos ayudar hoy?</p>
                <div class="flex flex-wrap gap-3">
                    
                    <button class="px-5 py-3 rounded-full border border-gray-200 text-sm font-bold text-black hover:border-black hover:bg-black hover:text-white transition-all cursor-pointer">
                        ¿Dónde está mi pedido? 📦
                    </button>
                    
                    <button class="px-5 py-3 rounded-full border border-gray-200 text-sm font-bold text-black hover:border-black hover:bg-black hover:text-white transition-all cursor-pointer">
                        Guía de tallas 📏
                    </button>
                    
                    <button class="px-5 py-3 rounded-full border border-gray-200 text-sm font-bold text-black hover:border-black hover:bg-black hover:text-white transition-all cursor-pointer">
                        Cambios y devoluciones 🔄
                    </button>
                    
                    <button class="px-5 py-3 rounded-full border border-gray-200 text-sm font-bold text-black hover:border-black hover:bg-black hover:text-white transition-all cursor-pointer">
                        Colaboraciones / Embajadores ✨
                    </button>
                    
                    <button class="px-5 py-3 rounded-full border border-gray-200 text-sm font-bold text-black hover:border-black hover:bg-black hover:text-white transition-all cursor-pointer">
                        Reportar un problema ⚠️
                    </button>
                    
                </div>
            </div>

            <div class="border-t border-gray-100 pt-8 space-y-4">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">✉️</div>
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase">Escríbenos</p>
                        <p class="text-sm font-bold text-black">soporte@urbankickz.com</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">📱</div>
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase">WhatsApp</p>
                        <p class="text-sm font-bold text-black">+52 (346) 123 4567</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 p-8 md:p-12 rounded-[2.5rem]">
            <form class="space-y-6">
                
                <div>
                    <label class="text-xs font-bold text-black uppercase block mb-2">Nombre completo</label>
                    <input type="text" placeholder="Ej. Alex Smith" 
                        class="w-full bg-white border border-transparent rounded-xl px-5 py-4 text-sm text-black placeholder-gray-400 focus:border-black focus:ring-0 outline-none transition-all">
                </div>

                <div>
                    <label class="text-xs font-bold text-black uppercase block mb-2">Correo electrónico</label>
                    <input type="email" placeholder="alex@ejemplo.com" 
                        class="w-full bg-white border border-transparent rounded-xl px-5 py-4 text-sm text-black placeholder-gray-400 focus:border-black focus:ring-0 outline-none transition-all">
                </div>

                <div>
                    <label class="text-xs font-bold text-black uppercase block mb-2">Tu mensaje</label>
                    <textarea rows="5" placeholder="Escribe aquí los detalles..." 
                        class="w-full bg-white border border-transparent rounded-xl px-5 py-4 text-sm text-black placeholder-gray-400 focus:border-black focus:ring-0 outline-none transition-all resize-none"></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-black text-white font-bold text-sm uppercase py-4 rounded-xl hover:bg-gray-800 transition-colors cursor-pointer">
                    Enviar mensaje
                </button>

            </form>
             <button type="submit" 
                    class="w-40 bg-black text-white font-bold text-sm uppercase py-4 rounded-xl hover:bg-gray-800 transition-colors cursor-pointer mt-6 ">
                    <a href="index.html"><strong>SALIR</strong></a>
                </button> 
        </div>

    </div>
</section>
</body>
</html>
